# Optionnel — isolation des deux services en dev.
# La voie principale reste `make dev` directement sur l'hôte.
# Activé dans une CONV ultérieure si besoin (typiquement CONV 14).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - APP_HOST=0.0.0.0
      - DATABASE_URL=sqlite:////data/mission-control.db
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://backend:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
