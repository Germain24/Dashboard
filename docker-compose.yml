# Mission Control — lancement complet en une commande (#195).
#   docker compose up --build
# Backend sur :8000, frontend sur :3000. La base SQLite est persistée dans ./data.
# Pour le mode production avec reverse proxy : voir docker-compose.prod.yml (#200).
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////data/mission-control.db
      WEB_CONCURRENCY: "1"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Inliné au build : appels client direct vers le backend publié.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      # Proxy /api/* côté serveur Next vers le service backend.
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
